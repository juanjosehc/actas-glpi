<form id="checklist-form">

    <section id="equipo-section">

        <h2>
            Información del Equipo
        </h2>

        <div class="form-field">

            <label for="serial">
                Serial
            </label>

            <input id="serial">

        </div>

        <button
            id="btn-buscar-equipo"
            type="button">

            Buscar

        </button>

    </section>

    <section id="datos-equipo">

        <div class="form-field">

            <label for="marca">
                Marca
            </label>

            <input
                id="marca"
                readonly>

        </div>

        <div class="form-field">

            <label for="tipo">
                Tipo
            </label>

            <input
                id="tipo"
                readonly>

        </div>

        <div class="form-field">

            <label for="modelo">
                Modelo
            </label>

            <input
                id="modelo"
                readonly>

        </div>

    </section>

    <section id="checklist-section">

        <!-- checks -->
         <section id="hardware-checklist">

            <h3>
                Hardware
            </h3>

            <label>

                <input
                    type="checkbox"
                    id="cargador">

                Cargador

            </label>

            <label>

                <input
                    type="checkbox"
                    id="mouse">

                Mouse

            </label>

            <label>

                <input
                    type="checkbox"
                    id="monitor">

                Monitor

            </label>

            <section id="software-checklist">

                <label>

                    <input
                        type="checkbox"
                        id="office">

                    Office

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="vpn">

                    VPN

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="antivirus">

                    Antivirus

                </label>

            </section>

        </section>

    </section>

</form>
